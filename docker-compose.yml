services:
  backend:
    build: ./backend
    container_name: backend_app
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
